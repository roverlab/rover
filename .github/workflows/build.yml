name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-latest
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64

    env:
      SINGBOX_VERSION: 1.13.2
      SHORT_SHA: ${GITHUB_SHA::7}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure resources directory
        run: node -e "const fs=require('fs'); if(!fs.existsSync('resources')) fs.mkdirSync('resources')"

      - name: Generate build info
        run: node scripts/generate-build-info.cjs ${{ env.SINGBOX_VERSION }} ${{ env.SHORT_SHA }}

      - name: Download sing-box
        run: |
          # arch 映射: x86_64 -> amd64, arm64 -> arm64
          if [ "${{ matrix.arch }}" == "x86_64" ]; then
            SB_ARCH="amd64"
          else
            SB_ARCH="${{ matrix.arch }}"
          fi

          if [ "${{ matrix.platform }}" == "windows" ]; then
            node scripts/download-singbox.cjs ${{ env.SINGBOX_VERSION }} win32 $SB_ARCH
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            node scripts/download-singbox.cjs ${{ env.SINGBOX_VERSION }} darwin $SB_ARCH
          else
            node scripts/download-singbox.cjs ${{ env.SINGBOX_VERSION }} linux $SB_ARCH
          fi
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: roverservice/go.sum

      - name: Build roverservice
        run: |
          cd roverservice
          # arch 映射: x86_64 -> amd64, arm64 -> arm64
          if [ "${{ matrix.arch }}" == "x86_64" ]; then
            GO_ARCH="amd64"
          else
            GO_ARCH="${{ matrix.arch }}"
          fi
          if [ "${{ matrix.platform }}" == "windows" ]; then
            # Build for Windows amd64
            GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../resources/roverservice.exe .
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            # Build for macOS (both arm64 and amd64)
            GOOS=darwin GOARCH=$GO_ARCH CGO_ENABLED=0 go build -ldflags="-s -w" -o ../resources/roverservice .
          else
            # Build for Linux
            GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../resources/roverservice .
          fi
        shell: bash

      - name: Download rulesets
        run: npx tsx scripts/download-rulesets.js

      - name: Build Frontend
        run: |
          npm run clean
          npm run gen:icon
          npm run build

      - name: Build Electron
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
              $VERSION="${{ github.ref_name }}".TrimStart("v")
          } else {
              $VERSION="latest"
          }

          # electron-builder 使用 x64 而不是 x86_64
          $EB_ARCH = if ("${{ matrix.arch }}" -eq "x86_64") { "x64" } else { "${{ matrix.arch }}" }

          if ("${{ matrix.platform }}" -eq "windows") {
              $ARTIFACT="Rover-$VERSION-windows-${{ matrix.arch }}.exe"
              # 关键：这里强制指定 --win nsis，覆盖 package.json 里的 "dir"
              npx electron-builder `
                --win nsis `
                --$EB_ARCH `
                --publish never `
                --config.nsis.artifactName=$ARTIFACT
          } elseif ("${{ matrix.platform }}" -eq "macos") {
              $ARTIFACT="Rover-$VERSION-macos-${{ matrix.arch }}.dmg"
              npx electron-builder `
                --mac dmg `
                --$EB_ARCH `
                --publish never `
                --config.dmg.artifactName=$ARTIFACT
          } else {
              $ARTIFACT="Rover-$VERSION-linux-${{ matrix.arch }}.AppImage"
              npx electron-builder `
                --linux appimage `
                --$EB_ARCH `
                --publish never `
                --config.linux.artifactName=$ARTIFACT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 调试输出：确认 release 文件夹内容（因为 package.json 里的 output 是 release）
      - name: Show build files
        shell: bash
        run: ls -R release

      # Show resources directory to verify build.json was included
      - name: Show resources files
        shell: bash
        run: ls -la resources/

      # 上传 Artifacts：上传 exe、dmg 和 AppImage 文件
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/Rover-*.exe
            release/Rover-*.dmg
            release/Rover-*.AppImage
          retention-days: 1

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref,'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release files
        run: ls -R release-assets

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符匹配 release-assets 目录及其子目录下所有相关文件
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
