name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64

    env:
      SINGBOX_VERSION: 1.13.2
      SHORT_SHA: ${GITHUB_SHA::7}

    steps:
      - name: Disable Windows Defender
        if: matrix.os == 'windows-latest'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: pwsh

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure resources directory
        run: node -e "const fs=require('fs'); if(!fs.existsSync('resources')) fs.mkdirSync('resources')"

      - name: Generate build info
        run: node scripts/generate-build-info.cjs ${{ env.SINGBOX_VERSION }} ${{ env.SHORT_SHA }}

      - name: Download sing-box
        run: node scripts/download-singbox.cjs ${{ env.SINGBOX_VERSION }} ${{ matrix.platform == 'windows' && 'win32' || 'darwin' }} ${{ matrix.arch }}

      - name: Download rulesets
        run: npx tsx scripts/download-rulesets.js

      - name: Build Frontend
        run: |
          npm run clean
          npm run gen:icon
          npm run build

      - name: Build Electron
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
              $VERSION="${{ github.ref_name }}".TrimStart("v")
          } else {
              $VERSION="latest"
          }

          if ("${{ matrix.platform }}" -eq "windows") {
              $ARTIFACT="Rover-$VERSION-windows-${{ matrix.arch }}.exe"
              # 关键：这里强制指定 --win nsis，覆盖 package.json 里的 "dir"
              npx electron-builder `
                --win nsis `
                --${{ matrix.arch }} `
                --publish never `
                --config.nsis.artifactName=$ARTIFACT
          } else {
              $ARTIFACT="Rover-$VERSION-macos-${{ matrix.arch }}.dmg"
              npx electron-builder `
                --mac dmg `
                --${{ matrix.arch }} `
                --publish never `
                --config.dmg.artifactName=$ARTIFACT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 调试输出：确认 release 文件夹内容（因为 package.json 里的 output 是 release）
      - name: Show build files
        shell: bash
        run: ls -R release

      # Show resources directory to verify build.json was included
      - name: Show resources files
        shell: bash
        run: ls -la resources/

      # 上传 Artifacts：只上传 exe 和 dmg 文件
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/Rover-*.exe
            release/Rover-*.dmg
          retention-days: 1

  publish-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref,'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release files
        run: ls -R release-assets

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符匹配 release-assets 目录及其子目录下所有相关文件
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
